<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- CUSTOMIZE: Change the page title -->
<title>Companion Chat</title>
<style>
/* ================================================================
   CSS Variables — edit these to theme the entire UI.
   The default is a clean dark mode.
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* -- Background -- */
  --bg:          #1a1a2e;
  --bg-surface:  #16162a;
  --bg-input:    rgba(255,255,255,0.06);
  --border:      rgba(255,255,255,0.08);

  /* -- Accent (sent-bubble tint, buttons, highlights) -- */
  --accent:      #6c8cff;
  --accent-dim:  rgba(108,140,255,0.25);
  --accent-text: #fff;

  /* -- Text -- */
  --text:        #e0e0e8;
  --text-dim:    rgba(224,224,232,0.45);
  --text-muted:  rgba(224,224,232,0.3);

  /* -- Received bubble -- */
  --recv-bg:     rgba(255,255,255,0.06);

  /* -- Sent bubble -- */
  --sent-bg:     rgba(108,140,255,0.15);

  /* -- Code blocks -- */
  --code-bg:     #0d0d1a;

  /* -- Font -- */
  --font:        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono:   "SF Mono", "Fira Code", "Cascadia Code", monospace;
  --font-size:   1rem;
}

/* Optional light theme — add data-theme="light" to <html> */
[data-theme="light"] {
  --bg:          #f5f5f7;
  --bg-surface:  #eeeef0;
  --bg-input:    rgba(0,0,0,0.04);
  --border:      rgba(0,0,0,0.08);
  --accent:      #4a6cf7;
  --accent-dim:  rgba(74,108,247,0.15);
  --accent-text: #fff;
  --text:        #1a1a2e;
  --text-dim:    rgba(26,26,46,0.5);
  --text-muted:  rgba(26,26,46,0.25);
  --recv-bg:     rgba(0,0,0,0.04);
  --sent-bg:     rgba(74,108,247,0.12);
  --code-bg:     #e8e8ee;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
}

/* ================================================================
   Layout
   ================================================================ */
#auth-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
#auth-overlay h1 {
  font-size: 1.6rem; font-weight: 600; color: var(--accent); letter-spacing: 0.05em;
}
#auth-overlay input {
  width: 260px; padding: 12px 16px;
  background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 1rem; font-family: var(--font);
  outline: none; text-align: center;
}
#auth-overlay input:focus { border-color: var(--accent-dim); }
#auth-error { color: #e06070; font-size: 0.85rem; min-height: 1.2em; }

#app { display: none; height: 100%; display: flex; flex-direction: column; }

/* -- Header -- */
#header {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
/* CUSTOMIZE: Companion name displayed in header */
#header h1 {
  font-size: 1.15rem; font-weight: 600; color: var(--text); flex: 1;
}
#cc-status {
  font-size: 0.7rem; color: var(--text-dim); font-family: var(--font-mono);
}
#theme-toggle, #clear-btn {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 1.1rem; padding: 4px 8px; border-radius: 6px;
  transition: color 0.15s;
}
#theme-toggle:hover, #clear-btn:hover { color: var(--accent); }

/* -- Chat area -- */
#chat-area {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
#chat-area::-webkit-scrollbar { width: 3px; }
#chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* -- Messages -- */
.msg-row {
  display: flex; gap: 8px; align-items: flex-end;
  max-width: 80%; animation: fadeIn 0.25s ease;
}
.msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.recv { align-self: flex-start; }

.bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: var(--font-size);
  line-height: 1.6;
  word-wrap: break-word;
  position: relative;
}
.bubble.sent {
  background: var(--sent-bg);
  color: var(--text);
  border-bottom-right-radius: 4px;
}
.bubble.recv {
  background: var(--recv-bg);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

/* Markdown inside received messages */
.bubble.recv .md p { margin: 0.4em 0; }
.bubble.recv .md strong { color: var(--accent); }
.bubble.recv .md em { opacity: 0.85; }
.bubble.recv .md code {
  background: var(--code-bg); padding: 2px 6px; border-radius: 4px;
  font-family: var(--font-mono); font-size: 0.85em;
}
.bubble.recv .md pre {
  background: var(--code-bg); padding: 12px; border-radius: 8px;
  overflow-x: auto; margin: 0.6em 0; position: relative;
}
.bubble.recv .md pre code { background: none; padding: 0; font-size: 0.85rem; }
.bubble.recv .md ul, .bubble.recv .md ol { margin: 0.4em 0; padding-left: 1.4em; }
.bubble.recv .md blockquote {
  border-left: 3px solid var(--accent-dim); padding-left: 10px;
  margin: 0.4em 0; color: var(--text-dim);
}
.bubble.recv .md a { color: var(--accent); text-decoration: none; }
.bubble.recv .md hr { border: none; border-top: 1px solid var(--border); margin: 0.8em 0; }

/* Copy button on code blocks */
.copy-btn {
  position: absolute; top: 6px; right: 6px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text-dim); padding: 2px 8px; border-radius: 4px;
  cursor: pointer; font-size: 0.7rem; font-family: var(--font-mono);
  opacity: 0; transition: opacity 0.2s;
}
.bubble.recv .md pre:hover .copy-btn { opacity: 1; }
.copy-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

/* Timestamp */
.msg-ts {
  font-size: 0.65rem; color: var(--text-muted);
  margin-top: 4px; font-family: var(--font-mono);
}
.msg-row.sent .msg-ts { text-align: right; }

/* Reactions */
.reactions {
  display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap;
}
.reaction-chip {
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 12px; padding: 2px 8px; font-size: 0.75rem;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.reaction-chip:hover { border-color: var(--accent-dim); }

/* Quick-react bar (appears on hover) */
.react-bar {
  position: absolute; top: -30px; right: 0;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 2px 4px;
  display: none; gap: 2px; z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.msg-row:hover .react-bar { display: flex; }
.react-bar button {
  background: none; border: none; cursor: pointer;
  font-size: 0.9rem; padding: 2px 4px; border-radius: 8px;
  transition: background 0.1s;
}
.react-bar button:hover { background: var(--bg-input); }

/* Sticker in message */
.sticker-msg { max-width: 160px; border-radius: 8px; overflow: hidden; }
.sticker-msg img { width: 100%; display: block; }

/* Voice message */
.voice-block {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; margin-top: 6px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 12px; max-width: 280px;
}
.voice-play {
  width: 30px; height: 30px; border-radius: 50%; border: none;
  background: var(--accent); color: var(--accent-text);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.voice-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; position: relative; }
.voice-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
.voice-time { font-size: 0.65rem; color: var(--text-dim); font-family: var(--font-mono); min-width: 30px; text-align: right; }

/* Typing indicator */
.typing-indicator {
  display: none; align-self: flex-start;
  padding: 10px 18px; background: var(--recv-bg);
  border-radius: 18px 18px 18px 4px;
}
.typing-indicator.visible { display: block; }
.typing-indicator span {
  display: inline-block; width: 6px; height: 6px;
  background: var(--text-dim); border-radius: 50%;
  margin: 0 2px; animation: typingDot 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes typingDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* Cursor while streaming */
.cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--accent); animation: blink 0.8s infinite;
  vertical-align: text-bottom; margin-left: 2px;
}
@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

/* ================================================================
   Input bar
   ================================================================ */
#input-bar {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--bg-surface);
  flex-shrink: 0;
}
#msg-input {
  flex: 1;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 20px; padding: 10px 16px;
  color: var(--text); font-size: 1rem; font-family: var(--font);
  outline: none; resize: none; max-height: 140px; line-height: 1.5;
}
#msg-input:focus { border-color: var(--accent-dim); }
#msg-input::placeholder { color: var(--text-muted); }

.input-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--border); background: none;
  color: var(--text-dim); cursor: pointer; font-size: 1.1rem;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.input-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

#send-btn {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  background: var(--accent); color: var(--accent-text);
  cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
#send-btn:hover { filter: brightness(1.1); }
#send-btn:disabled { opacity: 0.4; cursor: default; }

/* ================================================================
   Sticker panel
   ================================================================ */
#sticker-panel {
  display: none; flex-direction: column;
  height: 0; max-height: 0;
  background: var(--bg-surface); border-top: 1px solid var(--border);
  overflow: hidden; transition: max-height 0.25s ease, height 0.25s ease;
}
#sticker-panel.open { display: flex; height: 240px; max-height: 240px; }

#sticker-grid {
  flex: 1; display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 6px; overflow-y: auto; padding: 10px;
}
#sticker-grid::-webkit-scrollbar { width: 3px; }
#sticker-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#sticker-empty {
  grid-column: 1 / -1; text-align: center;
  padding: 40px 0; color: var(--text-dim); font-size: 0.85rem;
}

.sticker-item {
  aspect-ratio: 1; border-radius: 8px; overflow: hidden;
  cursor: pointer; border: 1px solid transparent;
  transition: all 0.15s; position: relative; background: var(--bg-input);
}
.sticker-item:hover { border-color: var(--accent); transform: scale(1.04); }
.sticker-item:active { transform: scale(0.96); }
.sticker-item img { width: 100%; height: 100%; object-fit: cover; }

.sticker-del {
  position: absolute; top: 3px; right: 3px;
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(0,0,0,0.6); color: #fff;
  font-size: 11px; border: none; cursor: pointer;
  display: none; align-items: center; justify-content: center; line-height: 1;
}
.sticker-item:hover .sticker-del { display: flex; }

#sticker-add {
  display: flex; gap: 6px; padding: 8px 10px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
#sticker-add input {
  flex: 1; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 6px 10px;
  font-size: 0.78rem; font-family: var(--font); outline: none; min-width: 100px;
}
#sticker-add input:focus { border-color: var(--accent-dim); }
#sticker-add input::placeholder { color: var(--text-muted); }
#sticker-add-btn {
  background: var(--accent); color: var(--accent-text); border: none;
  border-radius: 8px; padding: 6px 14px; cursor: pointer;
  font-size: 0.85rem; flex-shrink: 0;
}

/* ================================================================
   Responsive
   ================================================================ */
@media (max-width: 600px) {
  .msg-row { max-width: 90%; }
  #chat-area { padding: 12px; }
  #input-bar { padding: 8px 12px; }
  #sticker-panel.open { height: 200px; max-height: 200px; }
  #sticker-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
}
</style>
</head>
<body>

<!-- ====== Auth Overlay ====== -->
<div id="auth-overlay">
  <!-- CUSTOMIZE: Change the title shown on the login screen -->
  <h1>Companion</h1>
  <input type="password" id="auth-input" placeholder="password" autocomplete="off">
  <div id="auth-error"></div>
</div>

<!-- ====== Main App ====== -->
<div id="app">
  <!-- Header -->
  <div id="header">
    <!-- CUSTOMIZE: Change "Companion" to your preferred display name -->
    <h1>Companion</h1>
    <span id="cc-status"></span>
    <button id="theme-toggle" title="Toggle theme">&#9681;</button>
    <button id="clear-btn" title="Clear chat history">&#128465;</button>
  </div>

  <!-- Chat area -->
  <div id="chat-area">
    <!-- Messages are rendered here -->
  </div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typing">
    <span></span><span></span><span></span>
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <button class="input-btn" id="sticker-toggle" title="Stickers">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
        <line x1="9" y1="9" x2="9.01" y2="9"/>
        <line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
    </button>
    <!-- CUSTOMIZE: Change the placeholder text -->
    <textarea id="msg-input" rows="1" placeholder="Type a message..."></textarea>
    <button id="send-btn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
    </button>
  </div>

  <!-- Sticker panel -->
  <div id="sticker-panel">
    <div id="sticker-grid"></div>
    <div id="sticker-add">
      <input id="sticker-url" type="text" placeholder="Image URL"
        onkeydown="if(event.key==='Enter'){event.stopPropagation();document.getElementById('sticker-desc').focus()}">
      <input id="sticker-desc" type="text" placeholder="Description"
        onkeydown="if(event.key==='Enter'){event.stopPropagation();addSticker()}">
      <button id="sticker-add-btn" onclick="event.stopPropagation();addSticker()">+</button>
    </div>
  </div>
</div>

<!-- ====== Markdown renderer (lightweight) ====== -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
// ================================================================
// Config
// ================================================================
const TOKEN = localStorage.getItem('chat_token') || '';
let sending = false;
let pollTimer = null;
let pollSince = 0;

const $ = id => document.getElementById(id);

// Quick emoji list for reactions — CUSTOMIZE: add/remove as desired
const REACT_EMOJIS = ['❤️', '😂', '👍', '😮', '😢', '🔥'];

// ================================================================
// Markdown
// ================================================================
marked.setOptions({ breaks: true });

function renderMd(text) {
  if (!text) return '';
  // Sticker detection: [sticker:URL]
  const stickerMatch = text.match(/^\[sticker:(https?:\/\/[^\]]+)\]$/);
  if (stickerMatch) {
    return '<div class="sticker-msg"><img src="' + escHtml(stickerMatch[1]) + '"></div>';
  }
  let html = marked.parse(text);
  // Inject copy buttons into code blocks
  html = html.replace(/<pre><code/g, '<pre><button class="copy-btn" onclick="copyCode(this)">copy</button><code');
  return html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function copyCode(btn) {
  navigator.clipboard.writeText(btn.nextElementSibling.textContent);
  btn.textContent = '✓';
  setTimeout(() => btn.textContent = 'copy', 1500);
}

// ================================================================
// Auth
// ================================================================
async function tryAuth(token) {
  try {
    const r = await fetch('/api/health', {
      headers: token ? { 'x-auth-token': token } : {}
    });
    if (r.ok) {
      localStorage.setItem('chat_token', token);
      $('auth-overlay').style.display = 'none';
      $('app').style.display = 'flex';
      await init();
      return true;
    }
  } catch (e) {
    $('auth-error').textContent = 'Connection error';
  }
  return false;
}

$('auth-input').addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const ok = await tryAuth($('auth-input').value.trim());
    if (!ok) $('auth-error').textContent = 'Wrong password';
  }
});

// Auto-login if token stored
if (TOKEN) {
  tryAuth(TOKEN).then(ok => {
    if (!ok) $('auth-overlay').style.display = 'flex';
  });
} else {
  // Try without password (maybe CHAT_PASSWORD is unset)
  tryAuth('').then(ok => {
    if (!ok) $('auth-overlay').style.display = 'flex';
  });
}

// ================================================================
// API helpers
// ================================================================
function headers() {
  const h = { 'Content-Type': 'application/json' };
  const t = localStorage.getItem('chat_token');
  if (t) h['x-auth-token'] = t;
  return h;
}

// ================================================================
// Message rendering
// ================================================================
function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return h + ':' + m;
}

function addMessage(msg, animate) {
  const ca = $('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row ' + (msg.role === 'user' ? 'sent' : 'recv');
  row.dataset.id = msg.id || '';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (msg.role === 'user' ? 'sent' : 'recv');

  if (msg.role === 'user') {
    // Check for sticker
    const stkMatch = msg.content && msg.content.match(/^\[sticker:(https?:\/\/[^\]]+)\]$/);
    if (stkMatch) {
      bubble.innerHTML = '<div class="sticker-msg"><img src="' + escHtml(stkMatch[1]) + '"></div>';
    } else {
      bubble.textContent = msg.content;
    }
  } else {
    const md = document.createElement('div');
    md.className = 'md';
    md.innerHTML = renderMd(msg.content);
    bubble.appendChild(md);
  }

  // Timestamp
  const tsEl = document.createElement('div');
  tsEl.className = 'msg-ts';
  tsEl.textContent = formatTime(msg.ts);

  // Reactions
  const reactionsEl = document.createElement('div');
  reactionsEl.className = 'reactions';
  if (msg.reactions) {
    for (const [emoji, count] of Object.entries(msg.reactions)) {
      const chip = document.createElement('span');
      chip.className = 'reaction-chip';
      chip.textContent = emoji + (count > 1 ? ' ' + count : '');
      chip.onclick = () => doReact(msg.id, emoji);
      reactionsEl.appendChild(chip);
    }
  }

  // Quick-react bar
  const reactBar = document.createElement('div');
  reactBar.className = 'react-bar';
  REACT_EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.onclick = () => doReact(msg.id, emoji);
    reactBar.appendChild(btn);
  });

  bubble.appendChild(reactBar);
  bubble.appendChild(tsEl);
  bubble.appendChild(reactionsEl);

  row.appendChild(bubble);
  ca.appendChild(row);

  if (!animate) row.style.animation = 'none';
  smartScroll();

  return bubble;
}

function isNearBottom() {
  const ca = $('chat-area');
  return ca.scrollHeight - ca.scrollTop - ca.clientHeight < 80;
}

function smartScroll() {
  if (isNearBottom()) {
    $('chat-area').scrollTop = $('chat-area').scrollHeight;
  }
}

// ================================================================
// Reactions
// ================================================================
async function doReact(messageId, emoji) {
  if (!messageId) return;
  try {
    const r = await fetch('/api/react', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ messageId, emoji })
    });
    if (r.ok) {
      const data = await r.json();
      // Update reactions display
      const row = document.querySelector('[data-id="' + messageId + '"]');
      if (row) {
        const reactionsEl = row.querySelector('.reactions');
        reactionsEl.innerHTML = '';
        for (const [em, count] of Object.entries(data.reactions)) {
          const chip = document.createElement('span');
          chip.className = 'reaction-chip';
          chip.textContent = em + (count > 1 ? ' ' + count : '');
          chip.onclick = () => doReact(messageId, em);
          reactionsEl.appendChild(chip);
        }
      }
    }
  } catch (e) { /* ignore */ }
}

// ================================================================
// Stickers
// ================================================================
let stickerCache = [];

function toggleStickers(e) {
  if (e) e.stopPropagation();
  const panel = $('sticker-panel');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  if (!isOpen) loadStickers();
}

async function loadStickers() {
  try {
    const r = await fetch('/api/stickers', { headers: headers() });
    stickerCache = await r.json();
  } catch { stickerCache = []; }
  renderStickers();
}

function renderStickers() {
  const grid = $('sticker-grid');
  grid.innerHTML = '';
  if (!stickerCache.length) {
    grid.innerHTML = '<div id="sticker-empty">No stickers yet. Add one below.</div>';
    return;
  }
  stickerCache.forEach(s => {
    const item = document.createElement('div');
    item.className = 'sticker-item';
    const img = document.createElement('img');
    img.src = s.url; img.alt = s.name || ''; img.loading = 'lazy';
    img.onerror = () => item.style.display = 'none';
    item.appendChild(img);

    const del = document.createElement('button');
    del.className = 'sticker-del'; del.textContent = '×';
    del.onclick = e => { e.stopPropagation(); deleteSticker(s.id); };
    item.appendChild(del);

    item.onclick = () => sendSticker(s.url);
    if (s.desc) item.title = s.desc;
    grid.appendChild(item);
  });
}

async function addSticker() {
  const url = $('sticker-url').value.trim();
  if (!url) return;
  const desc = $('sticker-desc').value.trim();
  $('sticker-url').value = '';
  $('sticker-desc').value = '';
  try {
    await fetch('/api/stickers', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ url, desc })
    });
  } catch { /* ignore */ }
  await loadStickers();
}

async function deleteSticker(id) {
  try {
    await fetch('/api/stickers/' + id, { method: 'DELETE', headers: headers() });
  } catch { /* ignore */ }
  await loadStickers();
}

function sendSticker(url) {
  $('sticker-panel').classList.remove('open');
  const stickerTag = '[sticker:' + url + ']';
  $('msg-input').value = stickerTag;
  sendMessage();
}

$('sticker-toggle').addEventListener('click', toggleStickers);
document.addEventListener('click', e => {
  if (!e.target.closest('#sticker-panel') && !e.target.closest('#sticker-toggle')) {
    $('sticker-panel').classList.remove('open');
  }
});

// ================================================================
// Sending messages
// ================================================================
async function sendMessage() {
  const input = $('msg-input');
  const text = input.value.trim();
  if (!text || sending) return;

  input.value = '';
  autoResize();

  // Optimistically add to UI
  const msg = {
    id: 'pending_' + Date.now(),
    role: 'user',
    content: text,
    ts: Date.now()
  };
  addMessage(msg, true);

  sending = true;
  $('send-btn').disabled = true;

  try {
    const r = await fetch('/api/message', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ content: text })
    });
    if (r.ok) {
      const data = await r.json();
      // Update the pending message ID
      const row = document.querySelector('[data-id="pending_' + (msg.ts) + '"]');
      if (row) row.dataset.id = data.message.id;

      // Show typing indicator
      $('typing').classList.add('visible');
    }
  } catch (e) {
    // Show error in chat
    addMessage({ role: 'assistant', content: 'Error: ' + e.message, ts: Date.now() }, true);
  }

  sending = false;
  $('send-btn').disabled = false;
  input.focus();
}

// Auto-resize textarea
function autoResize() {
  const el = $('msg-input');
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
$('msg-input').addEventListener('input', autoResize);
$('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
$('send-btn').addEventListener('click', sendMessage);

// ================================================================
// Polling for new messages
// ================================================================
async function poll() {
  try {
    // Poll the cc-bridge for assistant messages
    const r = await fetch('/cc-poll?since=' + pollSince, {
      headers: headers()
    });
    if (!r.ok) return;
    const data = await r.json();

    // Update CC status
    const statusEl = $('cc-status');
    statusEl.textContent = data.cc_alive ? 'connected' : 'waiting for CC';

    pollSince = data.t || Date.now();

    if (data.messages && data.messages.length) {
      $('typing').classList.remove('visible');
      data.messages.forEach(msg => {
        addMessage({
          id: 'm_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,5),
          role: msg.role || 'assistant',
          content: msg.content,
          ts: msg.ts || Date.now()
        }, true);
      });
    }

    // Also poll for new messages from other sources
    const r2 = await fetch('/api/messages?since=' + (pollSince - 2000), {
      headers: headers()
    });
    if (r2.ok) {
      const msgs = await r2.json();
      msgs.forEach(msg => {
        // Skip if already rendered
        if (document.querySelector('[data-id="' + msg.id + '"]')) return;
        addMessage(msg, true);
      });
    }
  } catch { /* ignore */ }
}

// ================================================================
// Theme toggle
// ================================================================
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('chat-theme', theme);
  $('theme-toggle').innerHTML = theme === 'light' ? '&#9681;' : '&#9681;';
}

$('theme-toggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  setTheme(current === 'light' ? 'dark' : 'light');
});

// Restore saved theme
(function() {
  const saved = localStorage.getItem('chat-theme');
  if (saved) setTheme(saved);
})();

// ================================================================
// Clear history
// ================================================================
$('clear-btn').addEventListener('click', async () => {
  if (!confirm('Clear all chat history?')) return;
  try {
    await fetch('/api/messages', { method: 'DELETE', headers: headers() });
    $('chat-area').innerHTML = '';
  } catch (e) {
    alert('Failed to clear: ' + e.message);
  }
});

// ================================================================
// Voice message playback
// ================================================================
let currentAudio = null;

function createVoiceBlock(audioUrl) {
  const vb = document.createElement('div');
  vb.className = 'voice-block';

  const playBtn = document.createElement('button');
  playBtn.className = 'voice-play';
  playBtn.innerHTML = '▶';

  const track = document.createElement('div');
  track.className = 'voice-track';
  const fill = document.createElement('div');
  fill.className = 'voice-fill';
  track.appendChild(fill);

  const time = document.createElement('div');
  time.className = 'voice-time';
  time.textContent = '0:00';

  vb.appendChild(playBtn);
  vb.appendChild(track);
  vb.appendChild(time);

  const audio = new Audio(audioUrl);
  audio.onloadedmetadata = () => {
    const m = Math.floor(audio.duration / 60);
    const s = Math.floor(audio.duration % 60);
    time.textContent = m + ':' + String(s).padStart(2, '0');
  };
  audio.ontimeupdate = () => {
    if (audio.duration) {
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      const rem = audio.duration - audio.currentTime;
      const m = Math.floor(rem / 60);
      const s = Math.floor(rem % 60);
      time.textContent = m + ':' + String(s).padStart(2, '0');
    }
  };
  audio.onended = () => {
    playBtn.innerHTML = '▶';
    fill.style.width = '0%';
    currentAudio = null;
  };

  playBtn.onclick = () => {
    if (currentAudio === audio) {
      if (audio.paused) { audio.play(); playBtn.innerHTML = '⏸'; }
      else { audio.pause(); playBtn.innerHTML = '▶'; }
    } else {
      if (currentAudio) currentAudio.pause();
      currentAudio = audio;
      audio.play();
      playBtn.innerHTML = '⏸';
    }
  };

  track.onclick = e => {
    if (!audio.duration) return;
    const rect = track.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  };

  return vb;
}

// ================================================================
// Init
// ================================================================
async function init() {
  // Load existing messages
  try {
    const r = await fetch('/api/messages', { headers: headers() });
    if (r.ok) {
      const msgs = await r.json();
      msgs.forEach(msg => addMessage(msg, false));
      $('chat-area').scrollTop = $('chat-area').scrollHeight;
    }
  } catch { /* ignore */ }

  // Start polling
  pollSince = Date.now() - 5000;
  pollTimer = setInterval(poll, 1500);

  $('msg-input').focus();
}
</script>
